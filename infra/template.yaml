AWSTemplateFormatVersion: '2010-09-09'
Description: SAT Practice App - EC2 with Docker

Parameters:
  AppName:
    Type: String
    Default: sat-practice-app
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type (t2.micro is free tier eligible)
  KeyPairName:
    Type: String
    Description: Name of an existing EC2 Key Pair for SSH access

Resources:
  # Security Group
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  # EC2 Instance
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      ImageId: ami-0c02fb55956c7d316  # Amazon Linux 2023 (us-east-1)
      SecurityGroups:
        - !Ref AppSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-server'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y docker git
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

Outputs:
  PublicIP:
    Description: Public IP of the EC2 instance
    Value: !GetAtt AppInstance.PublicIp
  PublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt AppInstance.PublicDnsName
  AppURL:
    Description: Application URL
    Value: !Sub 'http://${AppInstance.PublicDnsName}:3000'
